services:
  nginx-healthprobe:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nginx-healthprobe
    ports:
      - "80:8080"
      - "443:8443"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      # 使用 named volume 保存日誌，容器更新或關閉後日誌不會遺失
      # 若需映射至主機特定目錄，請參考 README 「日誌持久化」章節
      - nginx-logs:/var/log/nginx
    security_opt:
      - no-new-privileges:true

volumes:
  nginx-logs:
