# nginx master 以 root 啟動，worker 降權至 nginx 使用者
user nginx;
worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # 使用 /tmp 作為暫存路徑，以支援 rootless 容器
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    # 隱藏 nginx 版本號，降低資訊洩漏風險
    server_tokens off;

    # 稽核日誌格式 — 包含時間、來源 IP、請求方法、路徑、User Agent 等關鍵欄位
    log_format audit '{"timestamp":"$time_iso8601",'
                     '"client_ip":"$remote_addr",'
                     '"client_port":"$remote_port",'
                     '"x_forwarded_for":"$http_x_forwarded_for",'
                     '"request_method":"$request_method",'
                     '"request_uri":"$request_uri",'
                     '"http_host":"$http_host",'
                     '"status":$status,'
                     '"body_bytes_sent":$body_bytes_sent,'
                     '"user_agent":"$http_user_agent",'
                     '"http_version":"$server_protocol"}';

    # 日誌同時輸出至標準輸出（容器化最佳實踐）及檔案（持久化保存）
    # 檔案日誌採用 JSON 稽核格式，透過 volume mount 映射至主機 /var/log/nginx-healthprobe/
    access_log /dev/stdout audit;
    access_log /var/log/nginx/access.log audit;
    error_log  /dev/stderr warn;
    error_log  /var/log/nginx/error.log warn;

    server {
        listen 8080;
        listen 8443;
        server_name _;

        # 健康探測 — 回傳包含網路診斷資訊的 JSON
        # 同時於 / 和 /healthz 兩個路徑提供服務
        location = / {
            default_type application/json;

            add_header X-Content-Type-Options    "nosniff"         always;
            add_header X-Frame-Options           "DENY"            always;
            add_header Cache-Control             "no-store, no-cache, must-revalidate" always;
            add_header Access-Control-Allow-Origin  "*"            always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;

            if ($request_method = 'OPTIONS') {
                return 204;
            }

            return 200 '{
"status": "healthy",
"timestamp": "$time_iso8601",
"client_ip": "$remote_addr",
"client_port": "$remote_port",
"x_forwarded_for": "$http_x_forwarded_for",
"request_method": "$request_method",
"request_uri": "$request_uri",
"http_host": "$http_host",
"user_agent": "$http_user_agent",
"http_version": "$server_protocol",
"accept_encoding": "$http_accept_encoding",
"accept": "$http_accept"
}';
        }

        location = /healthz {
            default_type application/json;

            add_header X-Content-Type-Options    "nosniff"         always;
            add_header X-Frame-Options           "DENY"            always;
            add_header Cache-Control             "no-store, no-cache, must-revalidate" always;
            add_header Access-Control-Allow-Origin  "*"            always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;

            if ($request_method = 'OPTIONS') {
                return 204;
            }

            return 200 '{
"status": "healthy",
"timestamp": "$time_iso8601",
"client_ip": "$remote_addr",
"client_port": "$remote_port",
"x_forwarded_for": "$http_x_forwarded_for",
"request_method": "$request_method",
"request_uri": "$request_uri",
"http_host": "$http_host",
"user_agent": "$http_user_agent",
"http_version": "$server_protocol",
"accept_encoding": "$http_accept_encoding",
"accept": "$http_accept"
}';
        }

        # 未定義路徑的預設回應
        location / {
            default_type application/json;
            return 404 '{"error": "not_found", "message": "Use / or /healthz for health probe"}';
        }
    }
}
