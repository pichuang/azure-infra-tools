# nginx master 以 root 啟動，worker 降權至 nginx 使用者
user nginx;
worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    js_import ssrf_handler from /etc/nginx/ssrf-handler.js;
    js_var $ssrf_log;

    # 使用 /tmp 作為暫存路徑，以支援 rootless 容器
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    # 隱藏 nginx 版本號，降低資訊洩漏風險
    server_tokens off;

    # 速率限制 — 每個 IP 每秒最多 10 次請求，超過則回傳 429
    limit_req_zone $binary_remote_addr zone=req_limit:10m rate=10r/s;
    limit_req_status 429;
    limit_req_log_level warn;

    # 根據 HTTP 狀態碼標記疑似攻擊者（429 = 觸發速率限制）
    map $status $suspected_attack {
        429     "true";
        default "false";
    }

    # 沿用用戶端 request ID；未提供時由 Nginx 自動產生
    map $http_x_request_id $correlation_id {
        ""      $request_id;
        default $http_x_request_id;
    }

    # 稽核日誌格式 — 包含時間、來源 IP、請求方法、路徑、User Agent 等關鍵欄位
    log_format audit '{"timestamp":"$time_iso8601",'
                     '"client_ip":"$remote_addr",'
                     '"client_port":"$remote_port",'
                     '"x_forwarded_for":"$http_x_forwarded_for",'
                     '"request_method":"$request_method",'
                     '"request_uri":"$request_uri",'
                     '"http_host":"$http_host",'
                     '"status":$status,'
                     '"body_bytes_sent":$body_bytes_sent,'
                     '"user_agent":"$http_user_agent",'
                     '"http_version":"$server_protocol",'
                     '"suspected_attack":"$suspected_attack"}';

    # SSRF catcher 專用日誌，由 njs 產生完整且已正確跳脫的 JSON
    log_format ssrf escape=none '$ssrf_log';

    # 日誌同時輸出至標準輸出（容器化最佳實踐）及檔案（持久化保存）
    # 檔案日誌採用 JSON 稽核格式，透過 volume mount 映射至主機 /var/log/nginx-healthprobe/
    access_log /dev/stdout audit;
    access_log /var/log/nginx/access.log audit;
    access_log /dev/stdout ssrf if=$ssrf_log;
    access_log /var/log/nginx/ssrf.log ssrf if=$ssrf_log;
    error_log  /dev/stderr warn;
    error_log  /var/log/nginx/error.log warn;

    server {
        listen 8080;
        listen 8443;
        server_name _;

        # 套用速率限制 — 允許瞬間突發 20 個請求，超過立即拒絕
        limit_req zone=req_limit burst=20 nodelay;

        # 自訂 429 回應 — 速率限制觸發時回傳 JSON 格式錯誤訊息
        error_page 429 = @rate_limited;
        location @rate_limited {
            default_type application/json;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Retry-After 1 always;
            return 429 '{"error": "too_many_requests", "http_status": 429, "message": "Rate limit exceeded. You have been flagged as a suspected attacker.", "timestamp": "$time_iso8601", "client_ip": "$remote_addr"}';
        }

        # 健康探測是唯一不進入 SSRF catcher 的 endpoint
        location = /healthz {
            default_type application/json;

            add_header X-Content-Type-Options    "nosniff"         always;
            add_header X-Frame-Options           "DENY"            always;
            add_header Cache-Control             "no-store, no-cache, must-revalidate" always;
            add_header Access-Control-Allow-Origin  "*"            always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;

            if ($request_method = 'OPTIONS') {
                return 204;
            }

            return 200 '{
"status": "healthy",
"http_status": 200,
"timestamp": "$time_iso8601",
"client_ip": "$remote_addr"
}';
        }

        # SSRF catcher — 捕捉 /healthz 以外的所有 path 與 HTTP method
        location / {
            default_type application/json;
            client_body_buffer_size 1m;

            add_header X-Content-Type-Options    "nosniff"         always;
            add_header X-Frame-Options           "DENY"            always;
            add_header Cache-Control             "no-store, no-cache, must-revalidate" always;
            add_header Access-Control-Allow-Origin  "*"            always;
            add_header Access-Control-Allow-Methods "GET, HEAD, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "*"            always;
            add_header X-Request-ID                "$correlation_id" always;

            js_content ssrf_handler.catchRequest;
        }
    }
}
